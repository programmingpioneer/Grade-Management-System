<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grade Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: white;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card h3 {
            color: #5e35b1;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .login-btn {
            background: #5e35b1;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 0.75rem;
            transition: all 0.3s ease;
            border-radius: 10px;
        }
        .login-btn:hover {
            background: #4a2793;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(94, 53, 177, 0.4);
        }
        /* Mobile extra polish */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 12px;
            }
            .login-card h3 {
                font-size: 1.5rem;
            }
            input.form-control {
                font-size: 1rem;  /* prevents iOS auto-zoom */
                padding: 0.7rem;
            }
            .login-btn {
                font-size: 1rem;
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">🎓 Grade Manager</h3>
        
        {% if error %}
        <div class="alert alert-danger py-2 text-center">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary w-100 login-btn">🔐 Secure Login</button>
        </form>
        
        <p class="text-center text-muted mt-3 mb-0" style="font-size: 0.8rem;">
            Default: <strong>admin</strong> / <strong>admin123</strong>
        </p>
    </div>
</body>
</html>
