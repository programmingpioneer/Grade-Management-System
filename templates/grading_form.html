{% extends "base.html" %}
{% block title %}Grading System{% endblock %}

{% block content %}
<style>
    @media (max-width: 576px) {
        .grading-card {
            padding: 1.5rem !important;
            border-radius: 12px !important;
        }
        .grading-card h3 {
            font-size: 1.4rem;
        }
        .grading-card input,
        .grading-card select {
            font-size: 1rem; /* prevents iOS zoom */
            padding: 0.6rem;
        }
    }
</style>

<!-- Top back link for easy navigation -->
<div class="mb-3">
    <a href="/" class="btn btn-outline-secondary btn-sm fw-bold">← Back to Dashboard</a>
</div>

<div class="card p-4 p-md-4 shadow-sm border-0 grading-card" style="max-width: 800px; margin: auto;">
    <h3 class="text-center fw-bold mb-4">🎓 Auto-Grading Engine</h3>
    
    <form method="POST" action="/preview_report">
        
        <h5 class="text-primary border-bottom pb-2">1. Select Student</h5>
        <div class="mb-4">
            <select name="student_id" class="form-select" required>
                <option value="" disabled selected>Search and select a student...</option>
                {% for student in students %}
                    <option value="{{ student.id }}">{{ student.name }} (ID: {{ student.student_id_code }})</option>
                {% endfor %}
            </select>
        </div>

        <h5 class="text-primary border-bottom pb-2">2. Attendance Data</h5>
        <div class="row mb-4">
            <div class="col-md-6 mb-3 mb-md-0">
                <label class="form-label fw-bold">Total Academic Days</label>
                <input type="number" name="total_days" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Days Attended</label>
                <input type="number" name="attended_days" class="form-control" required>
            </div>
        </div>

        <h5 class="text-primary border-bottom pb-2">3. Subject Marks (Out of 100)</h5>
        <div class="row mb-4">
            <div class="col-md-4 col-6 mb-3">
                <label class="form-label">English</label>
                <input type="number" name="eng" class="form-control" max="100" required>
            </div>
            <div class="col-md-4 col-6 mb-3">
                <label class="form-label">Urdu</label>
                <input type="number" name="urdu" class="form-control" max="100" required>
            </div>
            <div class="col-md-4 col-6 mb-3">
                <label class="form-label">Mathematics</label>
                <input type="number" name="math" class="form-control" max="100" required>
            </div>
            <div class="col-md-4 col-6 mb-3">
                <label class="form-label">Physics</label>
                <input type="number" name="phy" class="form-control" max="100" required>
            </div>
            <div class="col-md-4 col-6 mb-3">
                <label class="form-label">Computer Science</label>
                <input type="number" name="cs" class="form-control" max="100" required>
            </div>
            <div class="col-md-4 col-6 mb-3">
                <label class="form-label">Programming</label>
                <input type="number" name="prog" class="form-control" max="100" required>
            </div>
            <div class="col-md-4 col-6 mb-3">
                <label class="form-label">Database Systems</label>
                <input type="number" name="db_sys" class="form-control" max="100" required>
            </div>
        </div>

        <button type="submit" class="btn btn-info w-100 fw-bold text-white py-2" style="font-size: 1.05rem;">
            📋 Generate Preview
        </button>
    </form>
</div>
{% endblock %}
