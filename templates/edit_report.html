{% extends "base.html" %}
{% block title %}Edit Report Card{% endblock %}

{% block content %}
<div class="card p-4 shadow-sm border-0 rounded-4" style="max-width: 800px; margin: auto;">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h3 class="text-dark fw-bold mb-0">✏️ Edit Report Card</h3>
        <a href="/student/{{ report.student_id }}" class="btn btn-outline-secondary fw-bold">Cancel</a>
    </div>
    
    <div class="alert alert-info py-2 fw-bold">
        Updating Record for: {{ report.student.name }} (ID: {{ report.student.student_id_code }})
    </div>
    
    <form method="POST" action="/edit_report/{{ report.id }}">
        
        <h5 class="text-primary border-bottom pb-2 mt-4">1. Attendance Data</h5>
        <div class="row mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold">Total Academic Days</label>
                <input type="number" name="total_days" class="form-control" value="{{ report.total_days }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Days Attended</label>
                <input type="number" name="attended_days" class="form-control" value="{{ report.attended_days }}" required>
            </div>
        </div>

        <h5 class="text-primary border-bottom pb-2">2. Subject Marks (Out of 100)</h5>
        <div class="row mb-4">
            <div class="col-md-4 mb-3"><label class="fw-bold">English</label><input type="number" name="eng" class="form-control" max="100" value="{{ report.eng }}" required></div>
            <div class="col-md-4 mb-3"><label class="fw-bold">Urdu</label><input type="number" name="urdu" class="form-control" max="100" value="{{ report.urdu }}" required></div>
            <div class="col-md-4 mb-3"><label class="fw-bold">Mathematics</label><input type="number" name="math" class="form-control" max="100" value="{{ report.math }}" required></div>
            <div class="col-md-4 mb-3"><label class="fw-bold">Physics</label><input type="number" name="phy" class="form-control" max="100" value="{{ report.phy }}" required></div>
            <div class="col-md-4 mb-3"><label class="fw-bold">Computer Science</label><input type="number" name="cs" class="form-control" max="100" value="{{ report.cs }}" required></div>
            <div class="col-md-4 mb-3"><label class="fw-bold">Programming</label><input type="number" name="prog" class="form-control" max="100" value="{{ report.prog }}" required></div>
            <div class="col-md-4 mb-3"><label class="fw-bold">Database Systems</label><input type="number" name="db_sys" class="form-control" max="100" value="{{ report.db_sys }}" required></div>
        </div>

        <button type="submit" class="btn btn-warning w-100 fw-bold text-dark fs-5">Update Record & Recalculate</button>
    </form>
</div>
{% endblock %}
