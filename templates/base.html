<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Grade Manager{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f7f6; /* Clean background for the main content */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar-bg {
            background-color: #121416; /* Deep enterprise dark */
            box-shadow: 4px 0 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        .pro-nav-link {
            color: #aeb5bc !important;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 8px;
            margin-bottom: 8px;
            padding: 12px 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
        }
        .pro-nav-link:hover {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.08);
            transform: translateX(8px); /* Smooth slide right effect */
            border-left: 4px solid #f39c12; /* Warning/Yellow accent line */
        }
        .pro-nav-link.logout-btn:hover {
            border-left: 4px solid #e74c3c; /* Red accent for logout */
            background-color: rgba(231, 76, 60, 0.1);
            color: #e74c3c !important;
        }
        .main-content {
            padding: 40px;
            width: 100%;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row flex-nowrap min-vh-100">
            
            <div class="col-auto col-md-3 col-lg-2 sidebar-bg text-white d-flex flex-column p-4">
                
                <div class="text-center mb-4 mt-2">
                    <h4 class="fw-bolder text-white text-uppercase" style="letter-spacing: 2px;">Grade<span class="text-warning">Manager</span></h4>
                    <span class="badge bg-secondary rounded-pill" style="font-size: 0.7rem;">Admin Console</span>
                </div>
                
                <hr class="border-secondary mb-4 opacity-25">
                
                <ul class="nav flex-column mb-auto w-100">
                    <li class="nav-item">
                        <a href="/" class="nav-link pro-nav-link">🏠 <span class="ms-3 d-none d-md-inline">Dashboard</span></a>
                    </li>
                    <li class="nav-item">
                        <a href="/students" class="nav-link pro-nav-link">📁 <span class="ms-3 d-none d-md-inline">System Directory</span></a>
                    </li>
                    <li class="nav-item">
                        <a href="/grading_dashboard" class="nav-link pro-nav-link">🎓 <span class="ms-3 d-none d-md-inline">Grading Engine</span></a>
                    </li>
                    <li class="nav-item mt-2">
                        <a href="/analysis" class="nav-link pro-nav-link text-uppercase text-warning">📊 <span class="ms-3 d-none d-md-inline">Analytics</span></a>
                    </li>
                </ul>
                
                <div class="mt-5 w-100">
                    <hr class="border-secondary opacity-25 mb-3">
                    <a href="/logout" class="nav-link pro-nav-link logout-btn text-danger">
                        🚪 <span class="ms-3 d-none d-md-inline">Secure Logout</span>
                    </a>
                </div>

                <div class="mt-auto pt-3 w-100 text-center mb-2">
                    <hr class="border-secondary opacity-25 mb-3">
                    
                    <a href="https://github.com/programmingpioneer" target="_blank" title="Visit GitHub Profile">
                        <img src="https://github.com/programmingpioneer.png" alt="Sufyan Khan" class="rounded-circle mb-2 shadow-sm" style="width: 55px; height: 55px; border: 2px solid #f39c12; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                    </a>
                    
                    <p class="text-muted mb-0 text-uppercase fw-bold" style="font-size: 0.60rem; letter-spacing: 1px;">Architected & Engineered By</p>
                    <h6 class="text-warning fw-bold mb-1 mt-1" style="letter-spacing: 1px;">Sufyan Khan</h6>
                    
                    <div class="mt-2 mb-2">
                        <a href="https://github.com/programmingpioneer" target="_blank" class="badge bg-dark border border-secondary text-white-50 text-decoration-none" style="font-size: 0.65rem; transition: color 0.3s;" onmouseover="this.className='badge bg-dark border border-warning text-warning text-decoration-none'" onmouseout="this.className='badge bg-dark border border-secondary text-white-50 text-decoration-none'">
                            👨‍💻 @programmingpioneer
                        </a>
                        <a href="https://linkedin.com/in/sufyan-khans" target="_blank" class="badge bg-dark border border-secondary text-white-50 text-decoration-none" style="font-size: 0.65rem; transition: color 0.3s;" onmouseover="this.className='badge bg-dark border border-primary text-primary text-decoration-none'" onmouseout="this.className='badge bg-dark border border-secondary text-white-50 text-decoration-none'">
                            🔗 LinkedIn
                        </a>
                    </div>

                    <p class="text-muted mt-2 mb-0" style="font-size: 0.60rem; letter-spacing: 1px;">MALAKAND, KPK PK | © 2026</p>
                </div>
            </div> 
            <div class="col py-3 main-content">
                {% block content %}
                {% endblock %}
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
